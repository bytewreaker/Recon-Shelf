<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recon Shelf</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
      <div class="container">
        <span class="navbar-brand fw-bold fs-4">
          <i class="bi bi-shield-fill-exclamation me-2 text-danger"></i>
          Recon Shelf
        </span>
        <span class="text-muted small" id="tool-count"></span>
      </div>
    </nav>

    <div class="container py-4">
      <!-- Search -->
      <div class="mb-4">
        <div class="input-group search-bar">
          <span class="input-group-text bg-transparent border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input
            type="text"
            id="search-input"
            class="form-control border-start-0"
            placeholder="Search tools..."
          />
        </div>
      </div>

      <!-- Tag Filters -->
      <div class="mb-4" id="tag-filters">
        <button class="btn btn-tag active me-2 mb-2" data-tag="all">All</button>
      </div>

      <!-- Tools Grid -->
      <div class="row g-4" id="tools-grid"></div>

      <!-- Empty State -->
      <div id="empty-state" class="text-center py-5 d-none">
        <i class="bi bi-search fs-1 text-muted"></i>
        <p class="text-muted mt-3">
          No tools found. Try a different search or tag.
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
